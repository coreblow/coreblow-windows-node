name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Test
        run: dotnet test tests/CoreBlow.WindowsNode.Tests/CoreBlow.WindowsNode.Tests.csproj
